{% extends 'layout.html' %}

{% block title %}
  Edit Comment
{% endblock %}

{% block content %}
  <div class="mx-auto max-w-2xl px-4 py-8">
    <div class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
      <h1 class="mb-5 text-2xl font-bold text-gray-900">Edit Comment</h1>

      <form method="POST">
        {% csrf_token %}

        {{ form.content }}

        {% for error in form.content.errors %}
          <p class="mt-2 text-sm text-red-600">{{ error }}</p>
        {% endfor %}

        <input type="hidden" name="next" value="{{ comment.answer.question.get_absolute_url }}#comment-{{ comment.id }}" />

        <div class="mt-5 flex items-center gap-3">
          <button type="submit" class="rounded-md bg-blue-600 px-5 py-2 text-sm font-medium text-white transition hover:bg-blue-700">Save Changes</button>

          <a href="{{ comment.answer.question.get_absolute_url }}#comment-{{ comment.id }}" class="rounded-md border border-gray-300 px-5 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
