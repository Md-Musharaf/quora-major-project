{% extends "layout.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-6">
        Edit Profile
    </h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="w-full bg-blue-600 text-black py-2 px-4 rounded-md"
        >
            Save Changes
        </button>
    </form>

    <a
        href="{% url 'users:profile' %}"
        class="inline-block mt-4 text-blue-600 hover:underline"
    >
        Back to profile
    </a>
</div>
{% endblock %}
