{% load static tailwind_tags %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        Defalt Value
      {% endblock %}
    </title>
    {% tailwind_css %}
  </head>
  <body>
    <nav class="bg-black text-white p-4 text-2xl">Quora Navbar</nav>
    <form method="GET" action="{% url 'search' %}" class="hidden flex-1 md:block">
      <div class="relative max-w-md">
        <input type="text" name="q" value="{{ request.GET.q }}" placeholder="Search questions, users and topics" class="w-full rounded-full border border-gray-300 bg-gray-50 px-4 py-2 text-sm text-gray-900 outline-none transition focus:border-red-500 focus:bg-white focus:ring-2 focus:ring-red-100" />

        <button type="submit" class="absolute right-1 top-1/2 -translate-y-1/2 rounded-full bg-red-600 px-4 py-1.5 text-sm font-semibold text-white transition hover:bg-red-700">Search</button>
      </div>
    </form>
    {% if user.is_authenticated %}
      <span>Welcome, {{ user.profile.display_name }}</span>

      <a href="{% url 'home' %}">Home</a>

      <a href="{% url 'users:logout' %}">Logout</a>

      <a href="{% url 'users:profile' %}">Profile</a>
    {% else %}
      <a href="{% url 'users:login' %}">Login</a>

      <a href="{% url 'users:register' %}">Register</a>
    {% endif %}

    {% block content %}

    {% endblock %}
  </body>
</html>
