{% extends "layout.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <h1 class="text-2xl font-bold text-center mb-6">
        Login
    </h1>

    {% if error_message %}
        <p class="mb-4 text-red-600 text-center">
            {{ error_message }}
        </p>
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
            <label for="email" class="block mb-1 font-medium">
                Email
            </label>

            <input
                type="email"
                id="email"
                name="email"
                required
                class="w-full border rounded-md px-3 py-2"
            >
        </div>

        <div>
            <label for="password" class="block mb-1 font-medium">
                Password
            </label>

            <input
                type="password"
                id="password"
                name="password"
                required
                class="w-full border rounded-md px-3 py-2"
            >
        </div>

        <button
            type="submit"
            class="w-full bg-blue-600 text-black py-2 px-4 rounded-md hover:bg-blue-700"
        >
            Login
        </button>
    </form>

    <p class="text-center mt-4 text-sm">
        Don't have an account?

        <a
            href="{% url 'users:register' %}"
            class="text-blue-600 hover:underline"
        >
            Register
        </a>
    </p>
</div>
{% endblock %}
